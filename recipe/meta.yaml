{% set name = "lightning-cloud" %}
{% set version = "0.6.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/lightning_cloud-{{ version }}.tar.gz
  sha256: c44e0cde280e32d789ac1117118ce398839e576b7ed7244aaff38d9191e57fbc

build:
  entry_points:
    - lightning_cloud=lightning_cloud.cli.__main__:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - fastapi
    - python >={{ python_min }}
    - requests
    - rich
    - six
    - urllib3
    - uvicorn

test:
  imports:
    - lightning_cloud
  commands:
    - pip check
    - lightning_cloud --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://lightning.ai
  summary: Lightning AI Cloud API
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - Borda
    - weiji14
